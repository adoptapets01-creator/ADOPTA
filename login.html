<!DOCTYPE html>
<html>
<head>
<title>Adopta Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background-image:url("https://i.supaimg.com/30640085-64df-48fb-a5a1-1091d003b596/f5c9e9dc-d51d-4200-8f12-7491014f293d.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

/* Overlay */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* Glass Card */
.container{
    width:360px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 15px 40px rgba(0,0,0,0.35);
    text-align:center;
    color:white;
}

/* Logo */
.logo{
    font-size:32px;
    font-weight:600;
    margin-bottom:15px;
}

/* Inputs */
.field{
    display:block;
    width:100%;
    height:44px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
    padding:0 12px;
    background:rgba(255,255,255,0.25);
    color:white;
    font-size:14px;
    box-sizing:border-box;
}

.field::placeholder{
    color:#eee;
}

/* Button */
button{
    display:block;
    width:100%;
    height:44px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    background:#2563EB;
    color:white;
    font-size:15px;
    cursor:pointer;
    box-sizing:border-box;
}

/* Link */
.link{
    margin-top:15px;
    font-size:14px;
}

.link a{
    color:white;
    font-weight:600;
}
  
  /* Divider */
.divider{
    margin:18px 0 10px;
    font-size:14px;
    color:#eee;
}

/* Google Button */
.google-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    height:44px;
    background:white;
    color:#333;
    font-weight:500;
    border-radius:8px;
    border:none;
    margin-top:10px;
    box-sizing:border-box;
}
  
.google-btn img{
    width:20px;
}

.google-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(0,0,0,0.2);
}
  
/* Password Eye */
.password-box{
    position:relative;
    width:100%;
}

.password-box .field{
    padding-right:40px;
}

.eye{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    opacity:0.8;
}

.eye:hover{
    opacity:1;
}

/* Toast */
.toast{
    position:fixed;
    bottom:30px;
    right:30px;
    min-width:260px;
    padding:14px 20px;
    background:#111;
    color:#fff;
    border-radius:8px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    opacity:0;
    transform:translateY(20px);
    transition:all 0.3s ease;
    z-index:9999;
    font-size:14px;
}

.toast.show{
    opacity:1;
    transform:translateY(0);
}

.toast.success{
    background:#22c55e;
}

.toast.error{
    background:#ef4444;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">Ad🐾pta</div>

    <h3>Login</h3>

   <input class="field" type="email" placeholder="Email">

 <div class="password-box">
    <input class="field" type="password" id="password" placeholder="Password">
    
    <span class="eye" onclick="togglePassword()">
        <!-- Eye Open -->
        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            <circle cx="12" cy="12" r="2.5"/>
        </svg>

        <!-- Eye Closed -->
        <svg id="eyeClose" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white" style="display:none;">
            <path d="M2 2l20 20M10.5 10.5a3 3 0 0 0 4 4M9.9 5.1A10.9 10.9 0 0 1 12 5c7 0 10 7 10 7a17.6 17.6 0 0 1-3.2 4.6M6.5 6.5C4.5 8.2 3 12 3 12s3 7 10 7a10.7 10.7 0 0 0 3.1-.5"/>
        </svg>
    </span>
</div>
  
    <button onclick="login()">Login</button>
  
  
<div class="divider">or</div>

<button class="google-btn">
    <img src="https://developers.google.com/identity/images/g-logo.png">
    Continue with Google
</button>
    <div class="link">
        New user? <a href="register.html">Register</a>
    </div>

</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAyqttS3yl4qJMWF0fzsOyvTrf2-4JDkLY",
    authDomain: "adopta-25b7f.firebaseapp.com",
    projectId: "adopta-25b7f"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

  
  <script>
function togglePassword(){
    const pass = document.getElementById("password");
    const eyeOpen = document.getElementById("eyeOpen");
    const eyeClose = document.getElementById("eyeClose");

    if(pass.type === "password"){
        pass.type = "text";
        eyeOpen.style.display = "none";
        eyeClose.style.display = "block";
    }else{
        pass.type = "password";
        eyeOpen.style.display = "block";
        eyeClose.style.display = "none";
    }
}

function login(){
    const email = document.querySelector('input[type="email"]').value;
    const password = document.getElementById("password").value;

    if(!email || !password){
        showToast("Enter email and password");
        return;
    }

    auth.signInWithEmailAndPassword(email, password)

.then((userCredential) => {

    const user = userCredential.user;

    // Admin check
    if(user.email === "adopta.pets01@gmail.com"){
        localStorage.removeItem("redirectAfterLogin");
        window.location.href = "adminpanel.html";
        return;
    }

    // Check if any redirect is stored
   const redirectPage = localStorage.getItem("redirectAfterLogin");

if(redirectPage === "seller.html"){
    localStorage.removeItem("redirectAfterLogin");
    window.location.href = "seller.html";
}else{
    localStorage.removeItem("redirectAfterLogin");
    window.location.href = "index.html";
}

})
.catch((error) => {
    showToast(error.message);
});
}

const googleBtn = document.querySelector('.google-btn');

googleBtn.addEventListener('click', () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
        .then((result) => {
            const user = result.user;
            // Save user in Firestore if new
            db.collection("users").doc(user.uid).set({
                name: user.displayName,
                email: user.email,
                role: user.email === "adopta.pets01@gmail.com" ? "admin" : "user"
            }, {merge: true});
            
    // Check if admin
if(user.email === "adopta.pets01@gmail.com"){
    localStorage.removeItem("redirectAfterLogin");
    window.location.href = "adminpanel.html";
    return;
}

// Normal user redirect
const redirectPage = localStorage.getItem("redirectAfterLogin");

if(redirectPage === "seller.html"){
    localStorage.removeItem("redirectAfterLogin");
    window.location.href = "seller.html";
}else{
    localStorage.removeItem("redirectAfterLogin");
    window.location.href = "index.html";
}

        })
        .catch((error) => {
            showToast(error.message);
        });
});

function showToast(message, type="success"){
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.className = "toast show " + type;

    setTimeout(()=>{
        toast.className = "toast";
    },3000);
}


</script>

</body>
</html>
